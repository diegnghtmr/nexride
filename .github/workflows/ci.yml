name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint && npm run typecheck

  architecture-rules:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx depcruise --config .dependency-cruiser.cjs --output-type err src

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: >
          npm run test:unit -- --coverage
          --coverageThreshold='{"global":{"statements":85,"branches":80}}'

  integration-tests:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: nexride_test
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run migrate
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/nexride_test
          REDIS_URL: redis://localhost:6379
      - run: npm run test:integration
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/nexride_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

  performance-smoke:
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: grafana/setup-k6-action@v1
      - run: docker compose -f docker/docker-compose.ci.yml up -d
      - name: Wait for services
        run: sleep 15
      - run: npm run build
        env:
          NODE_ENV: production
      - run: node dist/main.js &
        env:
          NODE_ENV: production
          DATABASE_URL: postgresql://postgres:test@localhost:5432/nexride_perf
          REDIS_URL: redis://localhost:6379
          PORT: 3000
      - name: Wait for app
        run: sleep 5
      - run: k6 run test/performance/rides-request.k6.js
        env:
          BASE_URL: http://localhost:3000

  security-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Audit level set to critical — NestJS 10 + Express transitive highs are
      # tracked but do not have non-breaking fixes. Upgrade path: NestJS 11.
      - run: npm audit --audit-level=critical
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-openapi:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run openapi:generate
        env:
          NODE_ENV: development
          DATABASE_URL: postgresql://localhost/nexride_dev
          REDIS_URL: redis://localhost:6379
      - uses: actions/upload-artifact@v4
        with:
          name: openapi
          path: dist/openapi.json
