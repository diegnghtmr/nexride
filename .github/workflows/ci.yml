name: ci

on:
  push:
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint && npm run typecheck
      - name: Verify doc paths
        run: bash scripts/verify-doc-paths.sh
      - name: Verify doc consistency
        run: bash scripts/verify-doc-consistency.sh
      - name: Verify status consistency (SCOPE ↔ matrix)
        run: bash scripts/verify-status-consistency.sh
      - name: Verify env example
        run: npm run verify:env

  architecture-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx depcruise --config .dependency-cruiser.cjs --output-type err src

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Per-path thresholds live in jest.unit.config.cjs (Judgment 16° B1: application/
      # use-cases included with their own threshold; the previous global override here
      # collapsed all per-path config into a single global gate that misclassified the
      # use-case branches as failures).
      - run: npm run test:cov

  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: nexride_test
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run migrate
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/nexride_test
          REDIS_URL: redis://localhost:6379
      - run: npm run test:integration
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/nexride_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

  performance-smoke:
    runs-on: ubuntu-latest
    needs: integration-tests
    env:
      DATABASE_URL: postgresql://postgres:test@localhost:5432/nexride_perf
      REDIS_URL: redis://localhost:6379
      PORT: 3000
      NODE_ENV: development
      TEST_CONTEXT_GUARD_ENABLED: 'true'
      THROTTLER_DISABLED: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: grafana/setup-k6-action@v1
      - name: Start Postgres + Redis
        run: docker compose -f docker/docker-compose.ci.yml up -d
      - name: Wait for Postgres healthy
        run: |
          for i in $(seq 1 30); do
            if docker compose -f docker/docker-compose.ci.yml exec -T postgres pg_isready -U postgres >/dev/null 2>&1; then
              echo "Postgres ready after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "Postgres did not become ready in 30s"; exit 1
      - name: Wait for Redis healthy
        run: |
          for i in $(seq 1 30); do
            if docker compose -f docker/docker-compose.ci.yml exec -T redis redis-cli ping 2>/dev/null | grep -q PONG; then
              echo "Redis ready after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "Redis did not become ready in 30s"; exit 1
      - name: Run migrations
        run: npm run migrate
      - name: Seed perf data (safe_points + fleet)
        run: npx ts-node --transpile-only test/performance/seed.ts
      - name: Build app
        run: npm run build
      - name: Start app in background
        run: |
          nohup node dist/src/main.js > /tmp/app.log 2>&1 &
          echo $! > /tmp/app.pid
          echo "App PID: $(cat /tmp/app.pid)"
      - name: Wait for app readiness
        run: |
          # The app has no /health endpoint; any successful TCP+HTTP exchange proves the
          # Nest listener is up. We probe a real route (POST /rides/request without auth
          # → 403 from TestContextGuard) so a 200/2xx/4xx response means routing works.
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:3000/rides/request 2>/dev/null || true)
            case "$code" in
              2*|3*|4*|5*)
                echo "App ready after ${i}s (HTTP $code)"; exit 0 ;;
            esac
            if ! kill -0 "$(cat /tmp/app.pid)" 2>/dev/null; then
              echo "App process exited prematurely"; exit 1
            fi
            sleep 1
          done
          echo "App did not become ready in 60s"; exit 1
      - name: Run k6 smoke
        run: k6 run test/performance/rides-request.k6.js
        env:
          BASE_URL: http://localhost:3000
      - name: App log (always)
        if: always()
        run: |
          echo "----- /tmp/app.log -----"
          [ -f /tmp/app.log ] && cat /tmp/app.log || echo "(no log file)"
      - name: Stop app and tear down
        if: always()
        run: |
          if [ -f /tmp/app.pid ]; then
            kill "$(cat /tmp/app.pid)" 2>/dev/null || true
          fi
          docker compose -f docker/docker-compose.ci.yml down -v || true

  security-static:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Audit gate: high severity — aligned with docs/guia-implementacion.md §CT-07.
      # Post NestJS 11 migration: 0 high-severity vulnerabilities in production dependencies.
      # NestJS 11 + Express 5 + path-to-regexp 8 close all 7 highs documented in ADR-006 (now superseded).
      - run: npm audit --audit-level=high --omit=dev
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-openapi:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: nexride_openapi
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run openapi:generate
        env:
          NODE_ENV: development
          DATABASE_URL: postgresql://postgres:test@localhost:5432/nexride_openapi
          REDIS_URL: redis://localhost:6379
      - uses: actions/upload-artifact@v4
        with:
          name: openapi
          path: dist/openapi.json
